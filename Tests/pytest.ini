[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short

markers =
    smoke: plugin connectivity / tools/list / basic echo
    l1_readonly: read-only tools only (list / get)
    l2_write: low-risk write tools (compile / save / exec_command)
    l3_asset: asset create / modify / delete under /Game/_McpTest/<ts>/
    l4_runtime: requires PIE — headless 自动 skip；全量 GUI 必跑
    lua: requires UnLua at runtime — headless skip；全量 GUI 必跑
    requires_gui: needs RHI/viewport — headless skip；全量 GUI 必跑
    slow: long-running tests (>5s each)
    skipif_ue_below: 跳过低于指定版本的 UE（如 skipif_ue_below("5.0")）

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
