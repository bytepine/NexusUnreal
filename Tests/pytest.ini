[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short

markers =
    smoke: plugin connectivity / tools/list / basic echo
    l1_readonly: read-only tools only (list / get)
    l2_write: low-risk write tools (compile / save / exec_command)
    l3_asset: asset create / modify / delete under /Game/_McpTest/<ts>/
    l4_runtime: requires PIE — spawn_actor / interact_widget / control_pie etc.
    lua: requires UnLua plugin at runtime
    slow: long-running tests (>5s each)

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
